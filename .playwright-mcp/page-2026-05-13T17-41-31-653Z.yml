        - heading "Terms of Use" [level=3] [ref=e19]
        - generic [ref=e20]:
          - heading "1. Acceptance of Terms" [level=6] [ref=e21]
          - paragraph [ref=e22]: The following are terms of a legal agreement between you and TELUS Health, a trade name of TELUS Health Ltd., on its behalf and on behalf of its subsidiaries and affiliates ("TELUS Health").
          - paragraph [ref=e23]: By accessing, browsing and/or using this site, you acknowledge that you have read, understood and agree to abide by and comply with all terms, conditions and notice contained in or referenced by these Terms and Conditions of Use. You further agree to be governed by any additional terms and conditions that may apply to you arising out your accessing, browsing and/or using of this site, whether contained on this site or in a separate agreement with TELUS Health. In the event of any conflict between these Terms and Conditions of Use and such additional terms and conditions, such additional terms and conditions shall govern to the extent of the conflict. TELUS Health reserves the right, in its discretion, to update or revise these Terms and Conditions of Use and to post such updated or revised Terms and Conditions of Use on this site. If you do not agree to these Terms and Conditions of Use, please do not use this site. Please check the Terms and Conditions of Use periodically for changes. Your continued use of this site following the posting of any changes to the Terms and Conditions of Use constitutes acceptance of those changes.
          - heading "2. Statement of Understanding" [level=6] [ref=e24]
          - paragraph [ref=e25]: Your employer, or that of your partner or immediate family member, has arranged for TELUS Health to offer counselling and referral services to you. These services are voluntary, with the exception of monitored supervisory referrals and are provided at no cost to you.
          - paragraph [ref=e26]: Your discussions with your counsellor and records of your use of the TELUS Health EAP are confidential. Information will not be shared with your employer, or any other person or employer outside of TELUS Health, and where applicable to your referring TELUS Health EAP provider, without your prior knowledge and written consent. However, there are limited circumstances where the law requires disclosure. These include situations such as child protection concerns, medical emergencies, danger to public safety, and threats of violence or harm to oneself or to others. In addition, in some circumstances, TELUS Health may have a legal or contractual duty to warn appropriate individuals, when such warning is necessary to reduce or prevent a serious threat to the health and safety of you, another individual or the public. It is also possible for TELUS Health files to be subpoenaed by the Court. In situations involving immediate risk, TELUS Health will ensure that reasonable and appropriate steps are taken in an effort to avert any danger.
          - paragraph [ref=e27]: "All records of your use of the TELUS Health EAP are the confidential property of TELUS Health. Files are kept which include all contacts, dates, times and services provided to you. We guarantee that your personal identity and any personal file information will be protected. General statistics about the use of our service may be reported to your employer. For quality assurance purposes, a third-party auditor, inspector, bona fide evaluator or accreditor may be asked to review our clinical procedures and files. TELUS Health reserves the right to use non-identifying client information for statistical and research purposes. TELUS Health is in compliance with the Personal Information Protection and Electronic Documents Act (PIPEDA). Please note: TELUS Health only releases information that pertains to the client(s) requesting access to their file. With the exception of court orders, client records will not be released to third parties."
          - paragraph [ref=e28]: Occasionally, long-term counselling or specialized service or treatment is recommended beyond the parameters of your employer's TELUS Health EAP. In these situations, your TELUS Health counsellor will provide assistance in finding an appropriate outside resource in your community and follow up with that resource to ensure a smooth transition of service. All decisions regarding services provided will be discussed with clients, or as appropriate, his/her parent or legal guardian. Charges for services provided by any outside resource are your responsibility. Sometimes the cost can be covered by your Health Insurance or by your employer's benefit plan. Due to a potential conflict of interest, your TELUS Health counsellor cannot see you independently beyond the parameters of your employer's TELUS Health EAP.
          - paragraph [ref=e29]: The TELUS Health EAP does not advocate on your behalf in legal or work-related matters such as recommending time away from work. If you should require a copy of your file for any reason, you will be charged a processing fee. Please contact us at +1-800-387-4765 or ask your counsellor for details.
          - paragraph [ref=e30]: Your satisfaction with our service is important to us. You will be asked to complete a confidential user survey. If you do have concerns about your service, please call +1-800-387-4765 to speak to a supervisor.
          - heading "3. Privacy" [level=6] [ref=e31]
          - paragraph [ref=e32]:
            - text: From time to time, you may be requested to provide TELUS Health with personal information. Such personal information is subject to TELUS Health's Privacy Policy.
            - link "View TELUS Health’s Privacy Policy" [ref=e33] [cursor=pointer]:
              - /url: https://lifeworks.com/en/privacy-policy
          - heading "4. Third Party Information and Links" [level=6] [ref=e34]
          - paragraph [ref=e35]: This site may contain links to third party Web sites ("Linked Sites"), and may incorporate information obtained from third parties ("Third Party Information"). The Linked Sites and Third Party Information are not under the control of TELUS Health, and TELUS Health is not responsible for the contents of any Linked Site or Third Party Information, including without limitation the accuracy, copyright compliance, legality, decency, links or any other aspect of the Linked Sites. TELUS Health is not responsible for any form of transmission received from any Linked Site nor is TELUS Health responsible if the Linked Site is not working appropriately. TELUS Health provides such links and information to you only as a convenience. The inclusion of any link or Third Party Information does not imply endorsement by TELUS Health of the site or any association with its operators. You are responsible for viewing and abiding by the privacy statements and terms of use posted at the Linked Sites.
          - heading "5. Your Use Obligations" [level=6] [ref=e36]
          - paragraph [ref=e37]: "In consideration of your use of any services provided on the site, you agree to:"
          - paragraph [ref=e38]:
            - strong [ref=e39]: (a)
            - text: provide true, accurate, current and complete information about yourself where prompted by the site (such information being the "Personal Data") and
          - paragraph [ref=e40]:
            - strong [ref=e41]: (b)
            - text: maintain and promptly update the Personal Data to keep it true, accurate, current and complete.
          - paragraph [ref=e42]: If you provide any information that is untrue, inaccurate, not current or incomplete, or TELUS Health has reasonable grounds to suspect that such information is untrue, inaccurate, not current or incomplete, TELUS Health has the right to suspend or terminate any services provided to you by TELUS Health and refuse any and all current or future use of TELUS Health’s services (or any portion thereof).
          - paragraph [ref=e43]: By using this site and/or any TELUS Health service, you warrant that you have the capacity to understand and to appreciate the content of this site and the nature of the services provided by TELUS Health. You also warrant that you are capable of consenting to counselling or treatment in accordance with applicable federal and provincial legislation.
          - paragraph [ref=e44]: The services provided by TELUS Health are not intended for use by children. In the event that you, as a legal guardian, wish to allow your child to use this site and/or any TELUS Health service, you acknowledge that your child will have permission to access this entire site and make use of any TELUS Health services. You further acknowledge that, as the legal guardian, it is your responsibility to determine whether use of TELUS Health services and/or content transmitted through this site is appropriate for your child.
          - paragraph [ref=e45]: You are responsible for all activities undertaken by you when using the site and TELUS Health services. Should you be issued a password or account, you are responsible for all activities that occur under your password or account, and will keep your password(s) confidential. You will immediately notify us of any unauthorized use of your password or account or any other breach of security. You will not disrupt the functioning of the site, solicit another user's password, or otherwise act in a way that interferes with other users' use of the site. Nor may you post or distribute any computer program that damages, detrimentally interferes with, surreptitiously intercepts, or expropriates any system, data, or personal information.
          - paragraph [ref=e46]: Upon termination of any account you may have with TELUS Health, you authorize TELUS Health to delete any files, programs, data and email messages associated with such account.
          - paragraph [ref=e47]: You acknowledge that TELUS Health reserves the right, in its sole discretion, to terminate your access to this site and TELUS Health’s services or any portion thereof, for any reason without notice.
          - heading "6. Prohibited Uses" [level=6] [ref=e48]
          - paragraph [ref=e49]: You may not use this site and/or TELUS Health services in any manner which could damage, disable, overburden or impair this site and/or any TELUS Health services (or the network(s) connected to such site or services) or interfere with any other party's use and enjoyment of this site and/or TELUS Health services.
          - paragraph [ref=e50]: You may not attempt to gain unauthorized access to this site and/or any TELUS Health service, other accounts, computer systems or networks connected to this site, through hacking, password mining or any other means. You may not obtain or attempt to obtain any materials or information through any means not intentionally made available to you through this site.
          - paragraph [ref=e51]: "This site may contain e-mail services and/or other message or communication facilities designed to enable you to communicate with others (collectively, \"Communication Services\"). You agree to use the Communication Services only to post, send and receive messages and material that are proper and, when applicable, related to the particular Communication Service. By way of example, and not as a limitation, you agree that when using a Communication Service, you will not:"
          - list [ref=e52]:
            - listitem [ref=e53]: Use the Communication Service in connection with surveys, contests, pyramid schemes, chain letters, junk email, spamming or any duplicative or unsolicited messages (commercial or otherwise).
            - listitem [ref=e54]: Defame, abuse, harass, stalk, threaten or otherwise violate the legal rights (such as rights of privacy and publicity) of others.
            - listitem [ref=e55]: Publish, post, upload, distribute or disseminate any inappropriate, profane, defamatory, infringing, obscene, indecent or unlawful topic, name, material or information.
            - listitem [ref=e56]: Upload, post, email, transmit or otherwise make available any material that you do not have a right to make available under any law or under contractual or fiduciary relationships (such as software protected by intellectual property laws, inside information, proprietary and confidential information learned or disclosed as part of employment relationships or under nondisclosure agreements).
            - listitem [ref=e57]: Upload, post, email, transmit or otherwise make available any material that contains software viruses or any other computer code, files or programs designed to interrupt, destroy or limit the functionality of any computer software or hardware or telecommunications equipment, including without limitation, Trojan horses, worms, time bombs, cancelbots or corrupted files.
            - listitem [ref=e58]: Post, publish, modify, transmit, reproduce, or distribute in any way, information, software or other materials or tools designed for compromising the security of the Communication Services, our network or telecommunication services.
            - listitem [ref=e59]: Advertise or offer to sell or buy any goods or services for any business purpose, unless such Communication Service specifically allows such messages.
            - listitem [ref=e60]: Download any file posted by another user of a Communication Service that you know, or reasonably should know, cannot be legally distributed in such manner.
            - listitem [ref=e61]: Falsify or delete any email headers, author attributions, legal or other proper notices or proprietary designations or labels of the origin or source of email, software or other material in order to disguise the origin of such email, software or material.
            - listitem [ref=e62]: Restrict or inhibit any other user from using and enjoying the Communication Services, or create an unusually large burden on the Communication Services, such as by generating levels of traffic sufficient to impede others' ability to send or retrieve information.
            - listitem [ref=e63]: Violate any code of conduct or other guidelines which may be applicable for any particular Communication Service.
            - listitem [ref=e64]: Harvest or otherwise collect information about others, including e-mail addresses, without prior written authorization from such owners of such information.
            - listitem [ref=e65]: Violate any applicable laws or regulations.
            - listitem [ref=e66]: Impersonate any person or entity, or falsely state or otherwise misrepresent your affiliation with a person or entity, or create a false identity to mislead others.
          - paragraph [ref=e67]: TELUS Health reserves the right to review materials posted to or sent through the site and/or a Communication Service and to remove any materials in its sole discretion. TELUS Health further reserves the right to terminate your access to any or all of the Communication Services and this site at any time, without notice, for any reason whatsoever.
          - paragraph [ref=e68]: TELUS Health reserves the right at all times to disclose any information as TELUS Health deems necessary to satisfy any applicable law, regulation, legal process or governmental request or to edit, refuse to post or to remove any information or materials, in whole or in part, in TELUS Health's sole discretion.
          - paragraph [ref=e69]: All information, data, text, software, music, sound, photographs, graphics, video, messages, or other materials ("Content") posted to any Communication Services by any users are the sole responsibility of those users. TELUS Health does not guarantee the accuracy, copyright compliance, legality, integrity, quality, or decency of such Content. Posting your name, contact information, and any personal information in any Communication Services places that information into a public forum.
          - heading "7. Personal and Non-Commercial Use" [level=6] [ref=e70]
          - paragraph [ref=e71]: Unless otherwise specified, the services provided on this site are for your personal and non-commercial use. You may not modify, copy, distribute, transmit, display, perform, reproduce, publish, license, create derivative works from, transfer or sell any information, software, products or services obtained from this site.
          - heading "8. Downloads" [level=6] [ref=e72]
          - paragraph [ref=e73]: All content that is made available to view and/or download in connection with this site is owned by and is the copyrighted work of TELUS Health and/or its suppliers and is protected by copyright laws and international treaty provisions.
          - paragraph [ref=e74]: You further agree that you will not download any content without complying with all applicable use controls, laws and regulations, and you warrant that you will not download any content where such downloading is prohibited by local laws.
          - heading "9. Use of Email Services" [level=6] [ref=e75]
          - paragraph [ref=e76]: You agree that TELUS Health may establish limits concerning use of any services (including Communication Services and email services) offered on this site, including without limitation, the maximum number of days that e-mail messages will be retained by the service, the maximum number of e-mail messages that may be sent from or received by an account on the service, the maximum size of an e-mail message that may be sent from or received by an account on the service and the maximum number of times and duration you may access the service in a given period of time.
          - paragraph [ref=e77]: You agree that TELUS Health has no responsibility or liability for the deletion, corruption or failure to store any messages or other content maintained or transmitted by the service. You acknowledge that TELUS Health reserves the right to delete accounts without notice to you that are inactive for an extended period of time.
          - paragraph [ref=e78]: TELUS Health MAKES NO WARRANTY THAT ANY SERVICE WILL BE AVAILABLE, UNINTERRUPTED, TIMELY, SECURE OR ERROR-FREE.
