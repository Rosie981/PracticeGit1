          - paragraph [ref=e83]: IN NO EVENT SHALL TELUS Health BE LIABLE FOR ANY SPECIAL, INCIDENTAL, INDIRECT, PUNITIVE OR CONSEQUENTIAL DAMAGES OF ANY KIND, OR ANY DAMAGES WHATSOEVER, WHETHER IN CONTRACT, TORT, STRICT LIABILITY OR OTHERWISE, ARISING OUT OF OR IN CONNECTION WITH THE USE OF, OR INABILITY TO USE THIS SITE, WHETHER OR NOT TELUS Health HAS BEEN ADVISED OF THE POSSIBILITY OF SUCH DAMAGES. SOME JURISDICTIONS DO NOT ALLOW THE LIMITATION OR EXCLUSION OF LIABILITY FOR INCIDENTAL OR CONSEQUENTIAL DAMAGES SO THE ABOVE LIMITATIONS OR EXCLUSIONS MAY NOT APPLY TO YOU.
          - heading "12. Indemnification" [level=6] [ref=e84]
          - paragraph [ref=e85]: Upon reasonable request by TELUS Health, you agree to defend, indemnify and hold harmless TELUS Health and its employees, contractors, officers and directors from all liabilities, claims and expenses, including legal fees, that arise from your use or misuse of this site, including without limitation content sent or posted by you through the Communication Services, your connection to this site and/or TELUS Health’s services, your non-compliance with these terms and conditions of use, or your violation of any third-party rights. TELUS Health reserves the right, at its own expense, to assume the exclusive defence and control of any matter otherwise subject to indemnification by you, in which event you will cooperate with TELUS Health in asserting any available defences.
          - heading "13. Content Submitted to TELUS Health by You" [level=6] [ref=e86]
          - paragraph [ref=e87]: "In the event that you submit personal information to TELUS Health in confidence through this site, you consent to the collection, processing, transmission and disclosure of such information by TELUS Health for the purposes of TELUS Health’s internal use and specifically the purposes set out on the web page requesting such information or in TELUS Health's Privacy Policy. TELUS Health will make efforts to keep such personal information confidential, and shall not disclose such personal information to any third party except: (a) in confidence and to facilitate the provision of products and services to you, (b) to the extent required by law, or (c) in accordance with TELUS Health's Privacy Policy."
          - heading "14. Intellectual Property Rights" [level=6] [ref=e88]
          - paragraph [ref=e89]: All intellectual property rights in and to the site and TELUS Health’s services are and shall be owned by TELUS Health, absolutely. Those rights include, but are not limited to, database rights, copyright, design rights (whether registered or unregistered), trademarks (whether registered or unregistered) and other similar rights, wherever existing in the world, together with the right to apply for protection of the same.
          - heading "15. Modifications to Services Provided" [level=6] [ref=e90]
          - paragraph [ref=e91]: TELUS Health reserves the right at any time and from time to time to modify or discontinue, temporarily or permanently, any services (including email services) provided through this site (or any part thereof) with or without notice, or in accordance with the terms of your separate written agreement with TELUS Health. You agree that TELUS Health shall not be liable to you or to any third party for any modification, suspension or discontinuance of such services.
          - heading "16. Notice" [level=6] [ref=e92]
          - paragraph [ref=e93]: "All demands, notices, communications and reports relating to these terms and conditions of use shall be in writing and shall be either sent by facsimile transmission with confirmation to the number specified below or personally delivered or sent by reputable overnight courier services (delivery charges prepaid) to TELUS Health at the address specified below:"
          - heading "17. General Provisions" [level=6] [ref=e94]
          - paragraph [ref=e95]: This agreement is governed by the laws of the Province of Ontario, Canada, without regard to conflict of laws provisions, and you agree to submit to the exclusive jurisdiction of the courts located in the Province of Ontario, Canada. This agreement shall not be governed by the United Nations Convention on Contracts for the International Sale of Goods, the application of which is hereby expressly excluded.
          - paragraph [ref=e96]: If any part of this agreement is determined to be invalid or unenforceable pursuant to applicable law including, but not limited to, the warranty disclaimers and liability limitations set forth above, then the invalid or unenforceable provision will be deemed superseded by a valid, enforceable provision that most closely matches the intent of the original provision and the remainder of the agreement shall continue in effect.
          - paragraph [ref=e97]: Unless otherwise specified herein, this agreement constitutes the entire agreement between you and TELUS Health with respect to this site and TELUS Health services and it supersedes all prior or contemporaneous communications and proposals, whether electronic, oral or written, between you and TELUS Health with respect to this site and TELUS Health services. A printed version of this agreement and of any notice given in electronic form shall be admissible in judicial or administrative proceedings based upon or relating to this agreement to the same extent and subject to the same conditions as other business documents and records originally generated and maintained in printed form. It is the express will of the parties that this agreement and all related documents have been drawn up in English.
